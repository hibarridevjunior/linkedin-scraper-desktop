<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; margin: 0; }
    h2 { margin: 0 0 12px 0; font-size: 16px; }
    p { color: #666; margin: 0 0 12px 0; }
    .options { margin: 12px 0; padding: 12px; background: #f5f5f5; border-radius: 8px; }
    .option { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .option:last-child { margin-bottom: 0; }
    .option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .option label { cursor: pointer; flex: 1; }
    .option-title { font-weight: 600; display: block; }
    .option-desc { font-size: 12px; color: #666; margin-top: 2px; }
    .btn-bulk { width: 100%; padding: 12px 16px; background: #0d9488; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-bulk:hover { background: #0f766e; }
    .btn-bulk:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-stop-wrap { margin-top: 12px; }
    .btn-stop { width: 100%; padding: 8px 16px; background: #8b3a3a; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-stop:hover { background: #6b2a2a; }
    .btn-export { width: 100%; padding: 8px 16px; background: #5c2d91; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-export:hover { background: #4a2475; }
    .btn-export:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .ok { color: #057642; }
    .err { color: #c00; }
    .muted { color: #999; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Sales Nav → Marketing System</h2>
  <p>On a Sales Navigator <strong>people search results</strong> page, choose what the bulk scraper should do, then click <strong>Bulk scraper</strong>.</p>

  <div class="options">
    <div class="option">
      <input type="checkbox" id="optRun" checked>
      <label for="optRun">
        <span class="option-title">Run</span>
        <span class="option-desc">Get profile data &amp; LinkedIn link (up to 1000)</span>
      </label>
    </div>
    <div class="option">
      <input type="checkbox" id="optEnrich" checked>
      <label for="optEnrich">
        <span class="option-title">Enrich</span>
        <span class="option-desc">Get emails &amp; contact details from each profile</span>
      </label>
    </div>
    <div class="option">
      <input type="checkbox" id="optSave" checked>
      <label for="optSave">
        <span class="option-title">Save</span>
        <span class="option-desc">Save leads to the Marketing System app</span>
      </label>
    </div>
  </div>

  <button type="button" id="bulkScraperBtn" class="btn-bulk">Bulk scraper</button>
  <div class="btn-stop-wrap">
    <button type="button" id="stopBtn" class="btn-stop">Stop — save without contact details</button>
  </div>

  <div id="recoverWrap" class="btn-stop-wrap" style="display: none; padding: 10px; background: #fef3c7; border-radius: 8px;">
    <p style="margin: 0 0 8px 0; font-size: 13px;">Run was interrupted (e.g. PC slept). <span id="recoverCount">0</span> leads were saved.</p>
    <button type="button" id="recoverBtn" class="btn-export" style="background: #b45309;">Recover and view</button>
  </div>

  <div id="status" role="status" aria-live="polite"></div>
  <p class="muted">Marketing System app must be open (receiver on port 8765).</p>
  <script src="popup.js"></script>
</body>
</html>
